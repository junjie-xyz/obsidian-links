<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    >
    <title>Choose Obsidian Vault · Obsidian Links</title>
    <link rel="stylesheet" href="../assets/app.css">
    <script type="module" src="../assets/pages.js"></script>
  </head>
  <body>
    <main class="link-shell" data-action="choose-vault">
      <section class="link-panel" aria-labelledby="page-title">
        <a class="top-link" href="../">Obsidian Links</a>
        <h1 id="page-title">Choose Obsidian Vault</h1>
        <p class="lede">Review the generated URI, then open the vault manager locally.</p>
        <div class="status" data-status data-state="error">Checking link</div>
        <dl class="details" data-details></dl>
        <code class="uri-output" data-uri>No URI generated.</code>
        <div class="actions">
          <button class="primary" type="button" data-open disabled>Open Vault Manager</button>
          <button type="button" data-copy-uri disabled>Copy Obsidian URI</button>
          <button type="button" data-copy-value disabled>Copy Value</button>
        </div>
        <p class="fine-print">Add <code>autoopen=1</code> to the URL hash to attempt opening automatically.</p>
      </section>
    </main>
  </body>
</html>
